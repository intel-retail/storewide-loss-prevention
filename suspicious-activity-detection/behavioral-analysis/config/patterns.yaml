#
# Behavioral Analysis — Pattern Configuration
#
# Define activity patterns using declarative pose rules.
# No code changes required — add new patterns here and restart.
#
# See config/README.md for the full authoring guide.

patterns:
  shelf_to_waist:
    description: "Hand moves from shelf level to waist/pocket area"
    enabled: true
    alert_type: CONCEALMENT

    pose:
      per_side: true
      phases:
        - name: hand_raised
          min_frames: 3
          conditions:
            - subject: wrist
              relation: above
              reference: waist_midpoint
            - subject: wrist
              relation: not_near
              reference: nose
              threshold: 0.5

        - name: hand_to_conceal_zone
          min_frames: 3
          match: any
          conditions:
            - subject: wrist
              relation: near
              reference: waist_midpoint
              threshold: 0.6
            - subject: wrist
              relation: near
              reference: torso_center
              threshold: 0.5

    vlm:
      enabled: true
      num_frames: 4
      prompt: |
        Analyze 4 sequential CCTV frames of one person for CONCEALMENT.

        Suspicious=true REQUIRES ALL of these:
        1. Person's hand picks up a PRODUCT from a shelf (item must be visible in hand)
        2. That same item moves toward body/pocket/bag/clothing to be hidden

        Suspicious=false if:
        - No product visible in hand (just hand motion is NOT enough)
        - Person puts item in cart/basket or carries it openly
        - Person is only browsing, touching, or comparing items on shelf
        - Hand moves to waist but was already empty

        Respond with JSON only:
        {"suspicious": true|false, "confidence": 0.0-1.0, "reasoning": "one sentence"}
      response_fields:
        - suspicious
        - confidence
        - reasoning

  loitering:
    description: "Person remains stationary in a restricted area for too long"
    enabled: false
    alert_type: LOITERING

    pose:
      per_side: false
      window_size: 15
      phases:
        - name: stationary
          min_frames: 15
          conditions:
            - subject: left_hip
              relation: stationary
              threshold: 0.05

    vlm:
      enabled: true
      num_frames: 4
      prompt: |
        Analyze these sequential frames of a person in a store.

        Determine if the person appears to be loitering:
        - Are they standing idle in one place for an extended period?
        - Do they appear to be waiting without a clear purpose?
        - Are they near high-value merchandise or restricted areas?

        Respond ONLY with valid JSON in this exact format:
        {
          "suspicious": true or false,
          "confidence": 0.0 to 1.0,
          "reasoning": "brief description of what you observe"
        }
      response_fields:
        - suspicious
        - confidence
        - reasoning
