#
# Behavioral Analysis — Pattern Configuration
#
# Define activity patterns using declarative pose rules.
# No code changes required — add new patterns here and restart.
#
# See config/README.md for the full authoring guide.

patterns:
  shelf_to_waist:
    description: "Hand moves from shelf level to waist/pocket area"
    enabled: true
    alert_type: CONCEALMENT

    pose:
      per_side: true
      phases:
        - name: hand_raised
          min_frames: 3
          conditions:
            - subject: wrist
              relation: above
              reference: waist_midpoint
            - subject: wrist
              relation: not_near
              reference: nose
              threshold: 0.5

        - name: hand_to_conceal_zone
          min_frames: 3
          match: any
          conditions:
            - subject: wrist
              relation: near
              reference: waist_midpoint
              threshold: 0.6
            - subject: wrist
              relation: near
              reference: torso_center
              threshold: 0.5

    vlm:
      enabled: true
      num_frames: 4
      prompt: |
        You are a retail loss-prevention analyst reviewing CCTV evidence.
        You will see 4 surveillance frames of ONE person, in chronological order
        (frame 1 = earliest, frame 4 = latest).

        TASK: Decide whether this person is performing a CONCEALMENT action
        (taking merchandise from a shelf/display and hiding it on their body,
        waist, pocket, bag, or under clothing).

        Evidence FOR concealment:
        - Hand reaches toward shelf then moves item toward waist/pocket/bag/under clothing
        - Body shields or turns away from camera during the motion

        Evidence AGAINST (set suspicious=false):
        - Item placed openly in basket, cart, or carried visibly
        - Person is just browsing shelves without taking anything
        - Adjusting own belongings (phone, wallet, clothing)
        - No shelf interaction visible — hands stay at sides or above waist
        - Normal shopping behavior (comparing items, reading labels, putting item back)

        IMPORTANT: Most people in a store are NOT stealing. Default to suspicious=false unless you see CLEAR shelf-to-body concealment motion.

        Confidence: >=0.8 clear concealment, 0.5-0.79 ambiguous, <0.5 set suspicious=false.

        Respond ONLY with a single JSON object, no prose:
        {"suspicious": true|false, "confidence": 0.0, "reasoning": "one sentence citing cues observed"}
      response_fields:
        - suspicious
        - confidence
        - reasoning

  loitering:
    description: "Person remains stationary in a restricted area for too long"
    enabled: false
    alert_type: LOITERING

    pose:
      per_side: false
      window_size: 15
      phases:
        - name: stationary
          min_frames: 15
          conditions:
            - subject: left_hip
              relation: stationary
              threshold: 0.05

    vlm:
      enabled: true
      num_frames: 3
      prompt: |
        Analyze these sequential frames of a person in a store.

        Determine if the person appears to be loitering:
        - Are they standing idle in one place for an extended period?
        - Do they appear to be waiting without a clear purpose?
        - Are they near high-value merchandise or restricted areas?

        Respond ONLY with valid JSON in this exact format:
        {
          "suspicious": true or false,
          "confidence": 0.0 to 1.0,
          "reasoning": "brief description of what you observe"
        }
      response_fields:
        - suspicious
        - confidence
        - reasoning
