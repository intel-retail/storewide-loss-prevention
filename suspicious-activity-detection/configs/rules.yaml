#
# Declarative rules for loss prevention suspicious-activity detection.
# Each rule defines a trigger, conditions, and actions.
# Variable substitution: ${var_name:default} resolves from the "variables"
# section below, with environment overrides (RULES_VARIABLES) taking priority.

# Runtime settings consumed by swlp-service.
settings:
  session_timeout_seconds: 90
  loiter_threshold_seconds: 20
  behavioural_analysis_fps: 5
  ba_poll_interval_seconds: 1

# Default variable values — used in condition ${var:default} placeholders.
# Can be overridden at runtime via RULES_VARIABLES env var (JSON).
variables:
  repeat_visit_threshold: 4
  loiter_threshold_seconds: 20
  zone_crowding_threshold: 5
  objects_time_threshold_seconds: 30
  objects_time_threshold_count: 3

# Service definitions — MQTT wiring for escalation actions.
# Rules reference a service by name; the topic + payload template live here.
services:
  behavioral_analysis:
    mqtt_topic: ba/requests
    payload:
      person_id: "{object_id}"
      region_id: "{region_id}"
      scene_id: "{scene_id}"
      entry_timestamp: "{entry_timestamp}"

rules:
  - id: restricted_zone
    name: Restricted Zone Violation
    enabled: true
    trigger:
      event_type: zone_entry
      zone_type: RESTRICTED
    conditions: []
    actions:
      - type: alert
        params:
          alert_type: ZONE_VIOLATION
          severity: CRITICAL

  - id: repeated_visits
    name: Repeated High-Value Zone Visits
    enabled: true
    trigger:
      event_type: zone_entry
      zone_type: HIGH_VALUE
    conditions:
      - field: zone_visit_counts[region_id]
        op: gte
        value: ${repeat_visit_threshold:4}
    actions:
      - type: alert
        params:
          alert_type: REPEATED_VISIT
          severity: WARNING
          threshold: ${repeat_visit_threshold:4}

  - id: behavioral_analysis
    name: Trigger Behavioral Analysis on High-Value Entry
    enabled: true
    trigger:
      event_type: zone_entry
      zone_type: HIGH_VALUE
    conditions: []
    actions:
      - type: escalate
        params:
          service: behavioral_analysis

  - id: zone_crowding
    name: Zone Crowding Alert
    enabled: true
    trigger:
      event_type: zone_entry
      zone_type: HIGH_VALUE
    conditions:
      - field: zone_occupancy
        op: gte
        value: ${zone_crowding_threshold:5}
    actions:
      - type: alert
        params:
          alert_type: ZONE_CROWDING
          severity: WARNING
          threshold: ${zone_crowding_threshold:5}

  - id: objects_and_time
    name: Multiple Persons Lingering in Zone
    enabled: true
    trigger:
      event_type: zone_exit
      zone_type: HIGH_VALUE
    conditions:
      - field: zone_occupancy
        op: gte
        value: ${objects_time_threshold_count:3}
      - field: dwell_seconds
        op: gt
        value: ${objects_time_threshold_seconds:30}
    actions:
      - type: alert
        params:
          alert_type: CROWDING_LOITER
          severity: WARNING
          threshold_objects: ${objects_time_threshold_count:3}
          threshold_seconds: ${objects_time_threshold_seconds:30}

  - id: checkout_bypass
    name: Checkout Bypass Detection
    enabled: true
    trigger:
      event_type: zone_entry
      zone_type: EXIT
    conditions:
      - field: visited_high_value
        op: eq
        value: true
      - field: visited_checkout
        op: eq
        value: false
    actions:
      - type: alert
        params:
          alert_type: CHECKOUT_BYPASS
          severity: WARNING
          severity_if_concealment: CRITICAL

  - id: concealment
    name: Concealment Detected by Behavioral Analysis
    enabled: true
    trigger:
      event_type: concealment_detected
    conditions: []
    actions:
      - type: alert
        params:
          alert_type: CONCEALMENT
          severity: WARNING

  - id: loitering
    name: Loitering in High-Value Zone
    enabled: true
    trigger:
      event_type: zone_exit
      zone_type: HIGH_VALUE
    conditions:
      - field: dwell_seconds
        op: gt
        value: ${loiter_threshold_seconds:20}
    actions:
      - type: alert
        params:
          alert_type: LOITERING
          severity: WARNING
          threshold: ${loiter_threshold_seconds:20}
